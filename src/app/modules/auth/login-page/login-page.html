<div class="min-h-screen bg-gray-100 flex items-center justify-center px-4">
  <div class="bg-white rounded-2xl shadow-md p-8 w-full max-w-sm">

    <!-- Header -->
    <div class="text-center mb-6">
      <div class="text-4xl mb-2">🔐</div>
      <h4 class="text-xl font-bold text-gray-800">Welcome Back</h4>
      <p class="text-sm text-gray-500 mt-1">Sign in to your account</p>
    </div>

    <!-- Dummy login hint cards -->
    <div class="mb-5">
      <p class="text-xs text-gray-400 mb-2 text-center">Quick fill — click to autofill</p>
      <div class="flex gap-2">
        <button type="button" *ngFor="let u of dummyUsers" (click)="fillDummy(u)" class="flex-1 text-left border border-dashed border-gray-300 rounded-lg px-3 py-2
                 hover:border-blue-400 hover:bg-blue-50 transition text-xs text-gray-600">
          <div class="font-semibold text-gray-700">{{ u.name }}</div>
          <div class="text-gray-400 truncate">{{ u.email }}</div>
        </button>
      </div>
    </div>

    <!-- Error -->
    <div *ngIf="error"
      class="flex items-center gap-2 bg-red-50 border border-red-300 text-red-600 text-sm rounded-lg px-3 py-2 mb-4">
      ⚠️ {{ error }}
    </div>

    <form [formGroup]="loginForm" novalidate class="space-y-4">

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
        <input formControlName="email" type="email" placeholder="abc@school.com" class="w-full px-3 py-2 rounded-lg border text-sm outline-none transition
                 focus:ring-2 focus:ring-blue-500 focus:border-blue-500" [class.border-red-500]="isInvalid('email')"
          [class.border-green-500]="f['email'].valid && f['email'].touched"
          [class.border-gray-300]="!isInvalid('email') && !(f['email'].valid && f['email'].touched)" />
        <div *ngIf="isInvalid('email')" class="mt-1 text-xs text-red-500">
          <span *ngIf="f['email'].errors?.['required']">Email is required.</span>
          <span *ngIf="f['email'].errors?.['email']">Enter a valid email address.</span>
        </div>
      </div>

      <!-- Password -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <div class="relative">
          <input formControlName="password" [type]="showPassword ? 'text' : 'password'" placeholder="••••••••" class="w-full px-3 py-2 pr-10 rounded-lg border text-sm outline-none transition
                   focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
            [class.border-red-500]="isInvalid('password')"
            [class.border-green-500]="f['password'].valid && f['password'].touched"
            [class.border-gray-300]="!isInvalid('password') && !(f['password'].valid && f['password'].touched)" />
          <button type="button" (click)="showPassword = !showPassword"
            class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 text-xs">
            {{ showPassword ? '🙈' : '👁️' }}
          </button>
        </div>
        <div *ngIf="isInvalid('password')" class="mt-1 text-xs text-red-500">
          <span *ngIf="f['password'].errors?.['required']">Password is required.</span>
          <span *ngIf="f['password'].errors?.['minlength']">Minimum 6 characters required.</span>
        </div>
      </div>

      <!-- Submit -->
      <button type="submit" (click)="onLogin()" [disabled]="loading" class="w-full py-2 bg-blue-600 hover:bg-blue-700 disabled:opacity-60 disabled:cursor-not-allowed
               text-white text-sm font-semibold rounded-lg transition mt-2">
        <span *ngIf="!loading">Login</span>
        <span *ngIf="loading" class="flex items-center justify-center gap-2">
          <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
            viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
          </svg>
          Logging in...
        </span>
      </button>

    </form>
  </div>
</div>
