<div class="bg-white rounded-2xl shadow-md p-6 w-full max-w-lg">
    <h5 class="text-lg font-semibold text-gray-800 mb-5">
        {{ isEdit ? '✏️ Edit' : '➕ Add' }} Student
    </h5>

    <form [formGroup]="addUpdateForm" class="space-y-4">

        <!-- Name -->
        <app-form-field [form]="addUpdateForm" controlName="name" label="Name" placeholder="Enter full name"
            [isRequired]="true" [minlength]="3" [maxlength]="50">
        </app-form-field>

        <!-- Email -->
        <app-form-field [form]="addUpdateForm" controlName="email" label="Email" type="email"
            placeholder="example@mail.com" [isRequired]="true" patternType="email">
        </app-form-field>

        <!-- Phone -->
        <app-form-field [form]="addUpdateForm" controlName="phone" label="Phone" placeholder="10-digit mobile number"
            [isRequired]="true" [maxlength]="10" patternType="phone">
        </app-form-field>

        <!-- Grade -->
        <app-form-field [form]="addUpdateForm" controlName="grade" label="Grade" type="select" [options]="grades"
            [isRequired]="true">
        </app-form-field>

        <!-- ⚠️ Dirty warning (Modern Syntax) -->
        @if (addUpdateForm.dirty && addUpdateForm.invalid) {
        <div
            class="flex items-center gap-2 mt-3 bg-yellow-50 border border-yellow-300 text-yellow-700 text-xs rounded-lg px-3 py-2">
            ⚠️ Please fix the errors above before submitting.
        </div>
        }

        <!-- Actions -->
        <div class="flex gap-3 pt-2 mt-3">
            <button type="button" (click)="addUpdateClicked()" [disabled]="loading" class="flex items-center gap-2 px-5 py-2 bg-blue-600 hover:bg-blue-700
               disabled:opacity-60 disabled:cursor-not-allowed
               text-white text-sm font-medium rounded-lg transition">

                <!-- Spinner (Modern Syntax) -->
                @if (loading) {
                <svg class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg" fill="none"
                    viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
                </svg>
                }

                <span>
                    {{
                    loading
                    ? (isEdit ? 'Updating...' : 'Saving...')
                    : (isEdit ? 'Update' : 'Save')
                    }}
                </span>
            </button>

            <a routerLink="/student"
                class="px-5 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium rounded-lg transition cursor-pointer">
                Cancel
            </a>
        </div>

    </form>
</div>
