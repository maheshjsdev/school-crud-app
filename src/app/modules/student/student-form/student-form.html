<div class="bg-white rounded-2xl shadow-md p-6 w-full max-w-lg">
    <h5 class="text-lg font-semibold text-gray-800 mb-5">
        {{ isEdit ? '✏️ Edit' : '➕ Add' }} Student
    </h5>

    <form [formGroup]="addUpdateForm" class="space-y-4">

        <!-- Name -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
                Name <span class="text-red-500">*</span>
            </label>
            <input formControlName="name" placeholder="Enter full name" class="w-full px-3 py-2 rounded-lg border text-sm outline-none transition
               focus:ring-2 focus:ring-blue-500 focus:border-blue-500" [class.border-red-500]="isInvalid('name')"
                [class.focus:ring-red-200]="isInvalid('name')"
                [class.border-green-500]="f['name'].valid && f['name'].touched"
                [class.border-gray-300]="!isInvalid('name') && !(f['name'].valid && f['name'].touched)" />
            <div *ngIf="isInvalid('name')" class="mt-1 text-xs text-red-500">
                <span *ngIf="f['name'].errors?.['required']">Name is required.</span>
                <span *ngIf="f['name'].errors?.['minlength']">Minimum 3 characters required.</span>
            </div>
        </div>

        <!-- Email -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
                Email <span class="text-red-500">*</span>
            </label>
            <input formControlName="email" type="email" placeholder="example@mail.com" class="w-full px-3 py-2 rounded-lg border text-sm outline-none transition
               focus:ring-2 focus:ring-blue-500 focus:border-blue-500" [class.border-red-500]="isInvalid('email')"
                [class.focus:ring-red-200]="isInvalid('email')"
                [class.border-green-500]="f['email'].valid && f['email'].touched"
                [class.border-gray-300]="!isInvalid('email') && !(f['email'].valid && f['email'].touched)" />
            <div *ngIf="isInvalid('email')" class="mt-1 text-xs text-red-500">
                <span *ngIf="f['email'].errors?.['required']">Email is required.</span>
                <span *ngIf="f['email'].errors?.['email']">Enter a valid email address.</span>
            </div>
        </div>

        <!-- Phone -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
                Phone <span class="text-red-500">*</span>
            </label>
            <input formControlName="phone" placeholder="10-digit mobile number" maxlength="10" class="w-full px-3 py-2 rounded-lg border text-sm outline-none transition
               focus:ring-2 focus:ring-blue-500 focus:border-blue-500" [class.border-red-500]="isInvalid('phone')"
                [class.focus:ring-red-200]="isInvalid('phone')"
                [class.border-green-500]="f['phone'].valid && f['phone'].touched"
                [class.border-gray-300]="!isInvalid('phone') && !(f['phone'].valid && f['phone'].touched)" />
            <div *ngIf="isInvalid('phone')" class="mt-1 text-xs text-red-500">
                <span *ngIf="f['phone'].errors?.['required']">Phone is required.</span>
                <span *ngIf="f['phone'].errors?.['pattern']">Enter a valid 10-digit Indian mobile number.</span>
            </div>
        </div>

        <!-- Grade -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">
                Grade <span class="text-red-500">*</span>
            </label>
            <select formControlName="grade" class="w-full px-3 py-2 rounded-lg border text-sm outline-none transition bg-white
               focus:ring-2 focus:ring-blue-500 focus:border-blue-500" [class.border-red-500]="isInvalid('grade')"
                [class.focus:ring-red-200]="isInvalid('grade')"
                [class.border-green-500]="f['grade'].valid && f['grade'].touched"
                [class.border-gray-300]="!isInvalid('grade') && !(f['grade'].valid && f['grade'].touched)">
                <option value="">-- Select Grade --</option>
                <option *ngFor="let g of grades" [value]="g">{{ g }}</option>
            </select>
            <div *ngIf="isInvalid('grade')" class="mt-1 text-xs text-red-500">
                Please select a grade.
            </div>
        </div>

        <!-- Dirty warning -->
        <div *ngIf="addUpdateForm.dirty && addUpdateForm.invalid"
            class="flex items-center gap-2 bg-yellow-50 border border-yellow-300 text-yellow-700 text-xs rounded-lg px-3 py-2">
            ⚠️ Please fix the errors above before submitting.
        </div>

        <!-- Actions -->
        <div class="flex gap-3 pt-2">
            <button type="button" (click)="addUpdateClicked()" [disabled]="loading" class="flex items-center gap-2 px-5 py-2 bg-blue-600 hover:bg-blue-700
         disabled:opacity-60 disabled:cursor-not-allowed
         text-white text-sm font-medium rounded-lg transition">
                <!-- Spinner -->
                <svg *ngIf="loading" class="animate-spin h-4 w-4 text-white" xmlns="http://www.w3.org/2000/svg"
                    fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
                </svg>

                <span>{{ loading ? (isEdit ? 'Updating...' : 'Saving...') : (isEdit ? 'Update' : 'Save') }}</span>
            </button>
            <a routerLink="/student" class="px-5 py-2 bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium rounded-lg transition
            cursor-pointer">
                Cancel
            </a>
        </div>

    </form>
</div>
